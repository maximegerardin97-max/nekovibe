name: Daily Feedback Refresh

on:
  schedule:
    - cron: "0 0 * * *" # Every day at 00:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      GOOGLE_PLACES_IDS: ${{ secrets.GOOGLE_PLACES_IDS }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest Google reviews
        run: npx ts-node scripts/fetch-google-reviews.ts

      - name: Fetch Trustpilot reviews
        run: npx ts-node scripts/fetch-trustpilot-reviews.ts
        continue-on-error: true

      - name: Fetch Tavily recent insights (last 7 days)
        run: npm run fetch:tavily:recent

      - name: Fetch GNews recent insights (last 7 days)
        run: npm run fetch:gnews:recent

      - name: Generate/refresh summaries
        run: npx ts-node scripts/generate-summaries.ts

      - name: Fetch Zendesk tickets and CSAT
        run: npx ts-node scripts/fetch-zendesk.ts
        continue-on-error: true
        env:
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}

      - name: Generate/refresh review topics
        run: npx ts-node scripts/generate-topics.ts
        continue-on-error: true

